# ============================================================
#  Hotel Manager — configuración principal
#  Archivo: src/main/resources/application.properties
# ============================================================

# ------------------------------------------------------------
# SERVIDOR
# ------------------------------------------------------------
server.port=8080
spring.mvc.pathmatch.use-suffix-pattern=false

# ------------------------------------------------------------
# BASE DE DATOS
# ------------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_manager_v2?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ------------------------------------------------------------
# JPA / HIBERNATE
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ------------------------------------------------------------
# JWT
# ------------------------------------------------------------
app.jwt.secret=HotelManagerColombia2024ClaveSecretaSuperSeguraParaJWT
app.jwt.expiration-ms=86400000

# ------------------------------------------------------------
# CORS
# ------------------------------------------------------------
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000,https://a0cebd770617-165191712680306669.ngrok-free.app

# ------------------------------------------------------------
# LOGS
# ------------------------------------------------------------
logging.level.co.hotelmanager=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=OFF